name: eden_platform_flutter_example
description: Example app for the Eden platform Flutter shell.
publish_to: none

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  eden_platform_flutter:
    path: ..
  eden_ui_flutter:
    path: ../../eden-ui-flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Keep monorepo dev working — when running this example inside eden-libs,
# redirect transitive deps to local paths.
dependency_overrides:
  eden_ui_flutter:
    path: ../../eden-ui-flutter
  eden_platform_api_dart:
    path: ../../eden-platform-api-dart

flutter:
  uses-material-design: true
