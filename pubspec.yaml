name: eden_platform_flutter
description: "Shared auth, navigation, and platform shell for all Eden apps."
version: 0.0.1
homepage:
publish_to: none

environment:
  sdk: ^3.11.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  connectrpc: ^1.0.0
  flutter_riverpod: ^2.6.1
  http: ^1.2.0
  shared_preferences: ^2.3.0
  # CLI-01: encrypted token persistence (Keychain/EncryptedSharedPreferences).
  # Pinned to 9.2.4 — DO NOT bump to 10.x (upstream issue #1043 data-loss bug).
  # See eden-biz-flutter.SAAS/.planning/objectives/10-client-security-baseline/10-RESEARCH.md Pitfall 1.
  flutter_secure_storage: 9.2.4
  # Use git: with path: so external consumers can fetch this package
  # standalone via `eden_platform_flutter: { git: { url, ref } }`. Inside
  # the eden-libs monorepo, dependency_overrides in the consuming project
  # can redirect this to the local path during dev.
  eden_platform_api_dart:
    git:
      url: https://github.com/AO-Cyber-Systems/eden-libs.git
      path: eden-platform-api-dart
      ref: main
  go_router: ^14.0.0
  eden_ui_flutter:
    git:
      url: https://github.com/AO-Cyber-Systems/eden-ui-flutter.git
      ref: e081038
  # Networking — gold-standard dio_client donated from AODex.
  # See lib/src/networking/README.md.
  dio: ^5.9.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  web_socket_channel: ^3.0.3
  sentry_dio: ^8.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
